# Publisher: push the kit as an OCI artifact to Docker Hub on a version tag.
# Decoupled from the tester — only release tags trigger a push.
name: publish

on:
  push:
    tags:
      - "v*"          # e.g. v1.1.0 — see KIT_VERSION below
  workflow_dispatch:   # allow manual publish from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sbx CLI
        run: |
          curl -fsSL https://get.docker.com | sudo REPO_ONLY=1 sh
          sudo apt-get install -y docker-sbx

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Stage, validate, and push
        env:
          DOCKER_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
        run: ./scripts/publish.sh
